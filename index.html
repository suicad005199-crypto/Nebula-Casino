<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Casino | Texas Evolution</title>
    <style>
        :root {
            --nebula-blue: #A7C7E7;
            --neon-glow: #00d2ff;
            --glass-white: rgba(255, 255, 255, 0.15);
            --bg-deep: #0f172a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: var(--bg-deep);
            font-family: 'Inter', -apple-system, sans-serif;
            color: white; height: 100vh; overflow: hidden;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        }

        /* 賣點 1: Oracle HUD (機率顯示器) */
        .oracle-hud {
            position: fixed; top: 15%; width: 100%; text-align: center;
            font-family: 'Courier New', monospace; z-index: 10;
        }
        .probability-meter {
            background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon-glow);
            padding: 5px 15px; border-radius: 50px; font-size: 14px;
            color: var(--neon-glow); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
            display: inline-block; animation: pulse 2s infinite;
        }

        /* 賣點 2: Prism-Glass 卡牌視覺 */
        .card-container {
            display: flex; gap: 8px; justify-content: center; height: 100px;
        }
        .card {
            width: 65px; height: 95px; background: white; border-radius: 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 800; color: #1e293b; position: relative;
            box-shadow: 0 0 20px rgba(167, 199, 231, 0.4);
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .card.red { color: #ff3b30; }
        .card.back {
            background: linear-gradient(135deg, #a7c7e7 0%, #66a6ff 100%);
            border: 2px solid rgba(255,255,255,0.8);
        }

        /* 賣點 3: Radial Control (單手弧形控制) */
        .control-wheel {
            position: fixed; bottom: -30px; left: 0; width: 100%;
            height: 250px; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(30px); border-top: 1px solid rgba(255,255,255,0.2);
            border-radius: 50% 50% 0 0 / 20% 20% 0 0;
            padding-top: 40px; display: flex; flex-direction: column; align-items: center;
        }
        .main-actions {
            display: flex; justify-content: center; gap: 20px; width: 90%;
        }
        .action-btn {
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: var(--glass-white); color: white; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2); font-size: 12px;
        }
        .action-btn.primary {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4);
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--neon-glow); }
            100% { opacity: 0.7; }
        }

        /* 動態背景粒子 (CSS 模擬) */
        .nebula-particle {
            position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%;
            opacity: 0.3; animation: drift 10s infinite linear;
        }
    </style>
</head>
<body>

<div class="oracle-hud">
    <div class="probability-meter">ORACLE WIN RATE: <span id="win-rate">--%</span></div>
</div>

<div style="flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 40px;">
    <div id="ai-hand" class="card-container">
        <div class="card back"></div>
        <div class="card back"></div>
    </div>

    <div id="comm-area" class="card-container">
        <div class="card back"></div><div class="card back"></div>
        <div class="card back"></div><div class="card back"></div>
        <div class="card back"></div>
    </div>

    <div id="player-hand" class="card-container"></div>
</div>

<div class="control-wheel">
    <div style="margin-bottom: 20px; font-weight: bold; color: var(--nebula-blue);">
        POT: $<span id="pot-display">0</span> | CHIPS: $<span id="chips-display">1000</span>
    </div>
    <div class="main-actions">
        <button class="action-btn" onclick="game.action('FOLD')">❌<br>FOLD</button>
        <button class="action-btn" onclick="game.action('CALL')">🪙<br>CALL</button>
        <button class="action-btn primary" onclick="game.action('RAISE')">🔥<br>RAISE</button>
    </div>
</div>

<script>
    const RANKS = '23456789TJQKA';
    const SUITS = {S:'♠', H:'♥', D:'♦', C:'♣'};

    class NebulaPoker {
        constructor() {
            this.chips = 1000;
            this.pot = 0;
            this.phase = 0;
            this.deck = [];
            this.comm = [];
            this.player = [];
            this.init();
        }

        init() {
            this.deck = [];
            for (let r of RANKS) for (let s in SUITS) this.deck.push({r, s});
            this.deck.sort(() => Math.random() - 0.5);
            this.player = [this.deck.pop(), this.deck.pop()];
            this.render();
            this.updateOracle();
        }

        render() {
            const pH = document.getElementById('player-hand');
            pH.innerHTML = this.player.map(c => this.createCardHTML(c)).join('');
            
            const cH = document.getElementById('comm-area');
            cH.innerHTML = this.comm.map(c => this.createCardHTML(c)).join('') + 
                          Array(5 - this.comm.length).fill('<div class="card back"></div>').join('');
            
            document.getElementById('pot-display').innerText = this.pot;
            document.getElementById('chips-display').innerText = this.chips;
        }

        createCardHTML(card) {
            const isRed = card.s === 'H' || card.s === 'D';
            return `<div class="card ${isRed ? 'red' : ''}">
                <div style="font-size:1.5rem">${card.r === 'T' ? '10' : card.r}</div>
                <div style="font-size:1.2rem">${SUITS[card.s]}</div>
            </div>`;
        }

        action(type) {
            if (type === 'RAISE') {
                this.chips -= 100;
                this.pot += 100;
            } else if (type === 'CALL') {
                this.chips -= 50;
                this.pot += 50;
            } else if (type === 'FOLD') {
                alert("你棄牌了");
                return location.reload();
            }

            this.phase++;
            if (this.phase === 1) this.comm.push(this.deck.pop(), this.deck.pop(), this.deck.pop());
            else if (this.phase === 2 || this.phase === 3) this.comm.push(this.deck.pop());
            else if (this.phase === 4) alert("結算完成！");

            this.render();
            this.updateOracle();
        }

        // 賣點邏輯: 模擬預測演算法
        updateOracle() {
            let baseProb = 20;
            if (this.player[0].r === this.player[1].r) baseProb += 30; // 對子
            const r1 = RANKS.indexOf(this.player[0].r);
            const r2 = RANKS.indexOf(this.player[1].r);
            if (r1 > 10 || r2 > 10) baseProb += 15; // 高牌
            
            const finalProb = Math.min(99, baseProb + (this.phase * 10));
            document.getElementById('win-rate').innerText = `${finalProb}%`;
        }
    }

    const game = new NebulaPoker();

    // 增加背景裝飾粒子
    for(let i=0; i<30; i++) {
        const p = document.createElement('div');
        p.className = 'nebula-particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        p.style.animationDelay = Math.random() * 5 + 's';
        document.body.appendChild(p);
    }
</script>

</body>
</html>
