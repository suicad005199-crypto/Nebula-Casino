<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Casino - Pro Table</title>
    <style>
        :root {
            --foggy-blue: #7ba4c9; /* 牌桌主色 */
            --foggy-dark: #5a85aa;
            --glass-panel: rgba(255, 255, 255, 0.15);
            --border-glow: rgba(255, 255, 255, 0.3);
            --upoker-green: #34C759;
            --upoker-red: #FF3B30;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0; background: #1a1c23; /* 深色背景襯托牌桌 */
            font-family: -apple-system, sans-serif; height: 100vh;
            display: flex; flex-direction: column; color: white; overflow: hidden;
        }

        /* --- 牌桌區域 --- */
        .table-container {
            flex: 1; position: relative; display: flex; 
            justify-content: center; align-items: center; padding-top: 20px;
        }

        .poker-table {
            width: 90%; height: 65%;
            background: radial-gradient(ellipse at center, var(--foggy-blue) 0%, var(--foggy-dark) 100%);
            border-radius: 120px; /* 橢圓形牌桌 */
            border: 6px solid #2c3e50;
            box-shadow: 0 0 30px rgba(0,0,0,0.5) inset, 0 10px 20px rgba(0,0,0,0.4);
            position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* --- 座位與玩家資訊 --- */
        .seat {
            position: absolute; width: 60px; display: flex; flex-direction: column; align-items: center;
        }
        .seat.top { top: -30px; }
        .seat.left { left: -10px; top: 40%; }
        .seat.right { right: -10px; top: 40%; }
        
        .avatar {
            width: 50px; height: 50px; border-radius: 50%; background: #333;
            border: 2px solid var(--foggy-blue); display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 2;
        }
        .chip-stack {
            background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 10px;
            font-size: 11px; margin-top: -10px; z-index: 3; border: 1px solid var(--border-glow);
        }
        .dealer-btn {
            position: absolute; width: 18px; height: 18px; background: white; color: black;
            border-radius: 50%; font-size: 10px; font-weight: bold; line-height: 18px; text-align: center;
            right: -10px; top: 30px; box-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        /* --- 中央公牌與底池 --- */
        .pot-area {
            background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 20px;
            font-size: 13px; font-weight: bold; margin-bottom: 15px;
        }
        .community-cards { display: flex; gap: 5px; }
        .card {
            width: 45px; height: 65px; background: white; border-radius: 5px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 800; color: #333; font-size: 1.2rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .card.red { color: var(--upoker-red); }
        .card.back { background: repeating-linear-gradient(45deg, #2c3e50, #2c3e50 5px, #34495e 5px, #34495e 10px); border: 1px solid white; }

        /* --- 玩家底牌 (特大化) --- */
        .hero-hand {
            position: absolute; bottom: -20px; display: flex; gap: 5px; transform: scale(1.3);
        }

        /* --- 底部操作區 (UPoker Style 滑桿與按鈕) --- */
        .action-panel {
            height: 200px; background: #23252d; border-top: 1px solid #333;
            padding: 15px; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .slider-row {
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
        }
        .slider-row input[type=range] {
            flex: 1; -webkit-appearance: none; height: 8px; background: #444; border-radius: 4px;
        }
        .slider-row input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 28px; height: 28px; background: var(--foggy-blue);
            border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .raise-amount-box {
            background: #111; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 16px;
        }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .action-btn {
            border: none; padding: 15px 0; border-radius: 8px; font-size: 16px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; color: white; cursor: pointer;
        }
        .action-btn small { font-size: 11px; opacity: 0.8; margin-top: 3px; }
        
        .btn-fold { background: #3d404a; }
        .btn-call { background: var(--upoker-green); }
        .btn-raise { background: var(--foggy-blue); }
        .action-btn:active { transform: translateY(2px); }

    </style>
</head>
<body>

<div class="table-container">
    <div class="poker-table">
        
        <div class="seat left">
            <div class="avatar">👨‍🎤</div>
            <div class="chip-stack">2500</div>
        </div>

        <div class="seat top">
            <div class="avatar">🤖<div class="dealer-btn">D</div></div>
            <div class="chip-stack">1800</div>
        </div>

        <div class="seat right">
            <div class="avatar">🥷</div>
            <div class="chip-stack">3200</div>
        </div>

        <div class="pot-area">POT: 150 <span style="color:#aaa; font-weight:normal; margin-left:10px;">Call: 50</span></div>
        <div class="community-cards">
            <div class="card red"><div>K</div><div>♥</div></div>
            <div class="card"><div>8</div><div>♠</div></div>
            <div class="card red"><div>2</div><div>♦</div></div>
            <div class="card back"></div>
            <div class="card back"></div>
        </div>

        <div class="hero-hand">
            <div class="card red"><div>A</div><div>♥</div></div>
            <div class="card"><div>A</div><div>♣</div></div>
        </div>
    </div>
</div>

<div class="action-panel">
    <div class="slider-row">
        <span style="font-size: 12px; color: #888;">Min</span>
        <input type="range" id="raise-slider" min="100" max="1000" step="50" value="150" oninput="updateRaiseBtn()">
        <span style="font-size: 12px; color: #888;">All-in</span>
    </div>
    
    <div class="btn-row">
        <button class="action-btn btn-fold">
            FOLD
        </button>
        <button class="action-btn btn-call">
            CALL
            <small>50</small>
        </button>
        <button class="action-btn btn-raise" id="btn-raise">
            RAISE TO
            <small id="raise-val">150</small>
        </button>
    </div>
</div>

<script>
    // 簡單的滑桿連動 UI 邏輯
    function updateRaiseBtn() {
        const val = document.getElementById('raise-slider').value;
        document.getElementById('raise-val').innerText = val;
    }
</script>

</body>
</html>
