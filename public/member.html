<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="/style.css">
    <title>會員中心 - Nebula Casino</title>
    <style>
        .user-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            background: var(--card);
            border-bottom: 0.5px solid var(--border);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(184, 134, 11, 0.3);
        }
        .balance-card {
            margin-top: -20px;
            text-align: center;
            background: var(--gold);
            color: #000;
            padding: 20px;
        }
        .balance-amount {
            font-size: 28px;
            font-weight: 800;
            margin: 5px 0;
        }
        .menu-list {
            margin-top: 20px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 0.5px solid var(--border);
            color: var(--text);
            text-decoration: none;
        }
        .logout-btn {
            color: #ff3b30;
            text-align: center;
            margin-top: 30px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="user-header">
        <div class="avatar">👤</div>
        <div id="username" style="font-weight: 600;">載入中...</div>
    </div>

    <div class="card balance-card">
        <div style="font-size: 12px; opacity: 0.8;">我的餘額 (TWD)</div>
        <div id="balance" class="balance-amount">$ 0.00</div>
        <div style="font-size: 12px; opacity: 0.8;">即時同步中</div>
    </div>

    <div class="menu-list">
        <a href="#" class="menu-item"><span>💰 快速充值</span> <span>〉</span></a>
        <a href="#" class="menu-item"><span>🏦 提款申請</span> <span>〉</span></a>
        <a href="/report.html" class="menu-item"><span>📝 投注紀錄</span> <span>〉</span></a>
        <a href="#" class="menu-item"><span>⚙️ 帳戶設定</span> <span>〉</span></a>
        <div id="logout" class="menu-item logout-btn">登出帳號</div>
    </div>

    <nav class="tab-bar">
        <a href="index.html" class="tab-item">🏠<br>大廳</a>
        <a href="report.html" class="tab-item">📊<br>報表</a>
        <a href="member.html" class="tab-item active" style="color:#fccd4d">👤<br>會員</a>
    </nav>

    <script type="module">
        import { apiFetch } from '/assets/js/api.js';
        import { Auth } from '/assets/js/auth.js';

        async function initMember() {
            // 模擬獲取當前使用者 ID，實際應從 Auth 獲取
            try {
                // 假設我們獲取目前登入者的 profile
                // 這裡會對應您 SQL 建立的 profiles 資料表
                const data = await apiFetch('profiles?select=*');
                if (data && data[0]) {
                    document.getElementById('username').innerText = data[0].username || '星雲玩家';
                    document.getElementById('balance').innerText = `$ ${new Intl.NumberFormat().format(data[0].balance)}`;
                }
            } catch (err) {
                console.error('無法載入會員資料', err);
                document.getElementById('username').innerText = '訪客';
            }
        }

        document.getElementById('logout').addEventListener('click', () => {
            if(confirm('確定要登出嗎？')) {
                Auth.logout(); // 使用您 auth.js 定義的登出功能
            }
        });

        initMember();
    </script>
</body>
</html>
